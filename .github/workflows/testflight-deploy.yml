name: TestFlight Deploy

# How to trigger:
#   - Push a tag matching v1.2.3 (recommended for releases), or
#   - Manually via Actions → TestFlight Deploy → Run workflow
#
# Required GitHub secrets (set in Settings → Secrets and variables → Actions):
#   ASC_API_KEY_ID         App Store Connect API key ID (10 chars, e.g. ABCD1234EF)
#   ASC_API_ISSUER_ID      Issuer ID (UUID, e.g. 12345678-1234-1234-1234-123456789012)
#   ASC_API_KEY_P8         Full content of the .p8 file, including BEGIN/END lines
#   APPLE_TEAM_ID          Apple Developer team ID (10 chars, e.g. AB12CD34EF)
#
# This workflow does NOT run automatically until those secrets exist + the
# Apple Developer Program is active. See README.md "TestFlight Deployment Setup"
# for the one-time setup steps.

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'TestFlight release notes (shown to internal testers)'
        required: false
        default: 'Internal CI build'
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: testflight-deploy
  cancel-in-progress: false  # never cancel an in-progress upload

jobs:
  deploy:
    name: Archive + Upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    env:
      PROJECT: MLBValueBets.xcodeproj
      SCHEME: MLBValueBets
      CONFIGURATION: Release
      ARCHIVE_PATH: build/MLBValueBets.xcarchive
      EXPORT_PATH: build/export
      EXPORT_OPTIONS_PLIST: build/ExportOptions.plist

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain info
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Set build number to GitHub run number
        run: |
          mkdir -p build
          echo "Build number = ${{ github.run_number }}"
          # Marketing version stays whatever project.yml says (1.0.0).
          # Build number gets bumped on every CI run for uniqueness.

      - name: Install App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
        run: |
          if [ -z "$ASC_API_KEY_P8" ] || [ -z "$ASC_API_KEY_ID" ]; then
            echo "::error::Missing ASC_API_KEY_P8 or ASC_API_KEY_ID secret. See README.md → TestFlight Deployment Setup."
            exit 1
          fi
          # altool searches ~/private_keys/ for AuthKey_<KEY_ID>.p8
          mkdir -p ~/private_keys
          echo "$ASC_API_KEY_P8" > ~/private_keys/AuthKey_${ASC_API_KEY_ID}.p8
          chmod 600 ~/private_keys/AuthKey_${ASC_API_KEY_ID}.p8
          echo "ASC_API_KEY_PATH=$HOME/private_keys/AuthKey_${ASC_API_KEY_ID}.p8" >> $GITHUB_ENV

      - name: Archive (Release)
        run: |
          set -o pipefail
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_API_KEY_PATH" \
            -authenticationKeyID "${{ secrets.ASC_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_API_ISSUER_ID }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            CODE_SIGN_STYLE=Automatic \
            | xcbeautify --renderer github-actions

      - name: Write ExportOptions.plist
        run: |
          cat > "$EXPORT_OPTIONS_PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadSymbols</key>
            <true/>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
          </dict>
          </plist>
          EOF
          cat "$EXPORT_OPTIONS_PLIST"

      - name: Export .ipa
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_API_KEY_PATH" \
            -authenticationKeyID "${{ secrets.ASC_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_API_ISSUER_ID }}" \
            | xcbeautify --renderer github-actions
          ls -lh "$EXPORT_PATH"

      - name: Upload to TestFlight
        run: |
          IPA=$(find "$EXPORT_PATH" -name "*.ipa" | head -n 1)
          if [ -z "$IPA" ]; then
            echo "::error::No .ipa found in $EXPORT_PATH"
            exit 1
          fi
          echo "Uploading: $IPA"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "${{ secrets.ASC_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.ASC_API_ISSUER_ID }}"

      - name: Upload .ipa as artifact (debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MLBValueBets-Release-IPA-${{ github.run_number }}
          path: ${{ env.EXPORT_PATH }}/*.ipa
          retention-days: 30
          if-no-files-found: warn

      - name: Upload xcarchive (debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: MLBValueBets-Failed-Archive-${{ github.run_number }}
          path: ${{ env.ARCHIVE_PATH }}
          retention-days: 7
          if-no-files-found: warn
