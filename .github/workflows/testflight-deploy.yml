name: TestFlight Deploy

# How to trigger:
#   - Push a tag matching v1.2.3 (recommended for releases), or
#   - Manually via Actions → TestFlight Deploy → Run workflow
#
# Required GitHub secrets (set in Settings → Secrets and variables → Actions):
#   ASC_API_KEY_ID         App Store Connect API key ID (10 chars, e.g. ABCD1234EF)
#   ASC_API_ISSUER_ID      Issuer ID (UUID, e.g. 12345678-1234-1234-1234-123456789012)
#   ASC_API_KEY_P8         Full content of the .p8 file, including BEGIN/END lines
#   APPLE_TEAM_ID          Apple Developer team ID (10 chars, e.g. AB12CD34EF)
#   DIST_CERT_P12          Base64-encoded Apple Distribution .p12 certificate
#   DIST_CERT_PASSWORD     Password used when exporting the .p12

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'TestFlight release notes (shown to internal testers)'
        required: false
        default: 'Internal CI build'
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: testflight-deploy
  cancel-in-progress: false  # never cancel an in-progress upload

jobs:
  deploy:
    name: Archive + Upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain info
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import Distribution Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.DIST_CERT_P12 }}
          p12-password: ${{ secrets.DIST_CERT_PASSWORD }}

      - name: Install Fastlane
        run: bundle install

      - name: Upload to TestFlight via Fastlane
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUILD_NUMBER: ${{ github.run_number }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
        run: bundle exec fastlane beta

      - name: Upload .ipa as artifact (debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MLBValueBets-Release-IPA-${{ github.run_number }}
          path: build/export/*.ipa
          retention-days: 30
          if-no-files-found: warn

      - name: Upload xcarchive (debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: MLBValueBets-Failed-Archive-${{ github.run_number }}
          path: build/MLBValueBets.xcarchive
          retention-days: 7
          if-no-files-found: warn
