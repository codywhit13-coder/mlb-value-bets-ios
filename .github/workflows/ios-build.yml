name: iOS Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Avoid burning macOS minutes on duplicate builds
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (iOS Simulator, no signing)
    runs-on: macos-15
    timeout-minutes: 30

    env:
      PROJECT: MLBValueBets.xcodeproj
      SCHEME: MLBValueBets
      DESTINATION: "platform=iOS Simulator,name=iPhone 16 Pro,OS=latest"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode + macOS info
        run: |
          sw_vers
          xcodebuild -version
          xcode-select -p
          ls /Applications | grep -i xcode || true

      - name: Install XcodeGen
        run: brew install xcodegen || true && xcodegen --version

      - name: Generate Xcode project from project.yml
        run: |
          xcodegen generate
          ls -la "${PROJECT}"

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('project.yml') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve Swift package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "${PROJECT}" \
            -scheme "${SCHEME}"

      - name: Show resolved package versions
        run: |
          if [ -f "${PROJECT}/project.xcworkspace/xcshareddata/swiftpm/Package.resolved" ]; then
            cat "${PROJECT}/project.xcworkspace/xcshareddata/swiftpm/Package.resolved"
          else
            echo "No Package.resolved found yet"
          fi

      - name: List available simulators
        run: xcrun simctl list devices available | head -50

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project "${PROJECT}" \
            -scheme "${SCHEME}" \
            -destination "${DESTINATION}" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            | xcbeautify --renderer github-actions

      - name: Run unit tests
        # Runs all tests except snapshot/screenshot tests — must pass to deploy.
        run: |
          set -o pipefail
          xcodebuild test \
            -project "${PROJECT}" \
            -scheme "${SCHEME}" \
            -destination "${DESTINATION}" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            -skip-testing:MLBValueBetsTests/ViewSnapshotTests \
            -skip-testing:MLBValueBetsTests/AppStoreScreenshotTests \
            -resultBundlePath build/TestResults.xcresult \
            | xcbeautify --renderer github-actions

      - name: Run snapshot tests
        # Compares rendered views against committed baselines. Allowed to fail
        # (continue-on-error) so visual regressions don't block deployment —
        # diffs are uploaded as artifacts for review. Set isRecording=true in
        # ViewSnapshotTests to regenerate baselines, then commit the new PNGs.
        continue-on-error: true
        run: |
          set -o pipefail
          xcodebuild test \
            -project "${PROJECT}" \
            -scheme "${SCHEME}" \
            -destination "${DESTINATION}" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            -only-testing:MLBValueBetsTests/ViewSnapshotTests \
            -only-testing:MLBValueBetsTests/AppStoreScreenshotTests \
            -resultBundlePath build/SnapshotResults.xcresult \
            | xcbeautify --renderer github-actions

      - name: Upload .app bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MLBValueBets-Debug-Simulator
          path: |
            ~/Library/Developer/Xcode/DerivedData/MLBValueBets-*/Build/Products/Debug-iphonesimulator/MLBValueBets.app
          retention-days: 7
          if-no-files-found: warn

      - name: Upload snapshot PNGs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snapshots-${{ github.run_number }}
          path: MLBValueBetsTests/__Snapshots__/**
          retention-days: 30
          if-no-files-found: warn

      - name: Upload test result bundle (debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: build/TestResults.xcresult
          retention-days: 7
          if-no-files-found: ignore
